<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>합격즁 발급소</title>
  <style>
    @font-face {
      font-family: "Binggrae";
      src: url("./assets/fonts/Binggrae.otf") format("opentype");
      font-display: swap;
    }

    :root {
      --bg: #ffffff;
      --paper: #ffffff;
      --ink: #171717;
      --muted: #6b655f;
      --line: rgba(23, 23, 23, 0.08);
      --accent: #d53232;
      --shadow: 0 18px 50px rgba(42, 34, 23, 0.12);
      --radius: 28px;
      --label-inset: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: "Binggrae", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    body::before {
      content: none;
    }

    .page {
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 40px;
    }

    .hero {
      display: grid;
      gap: 4px;
      margin-bottom: 12px;
      justify-items: center;
      text-align: center;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 8px 0 6px;
      overflow: visible;
    }

    .title-figure {
      position: relative;
      width: 88px;
      flex: 0 0 auto;
      overflow: visible;
      z-index: 1;
    }

    .title-figure img {
      width: 100%;
      height: auto;
      display: block;
      transform: none;
    }

    .title-main {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      flex: 0 1 auto;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .title-stamp {
      position: relative;
      width: 66px;
      height: 66px;
      margin-left: -2px;
      margin-top: -10px;
      transform: rotate(-11deg);
      display: block;
      flex: 0 0 auto;
      pointer-events: none;
      object-fit: contain;
      z-index: 2;
    }

    .hero-copy {
      margin: 2px 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(210px, 270px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .selector {
      padding: 14px;
      position: sticky;
      top: 16px;
    }

    .selector-title {
      margin: 0 0 8px;
      padding-left: var(--label-inset);
      font-size: 13px;
      color: var(--muted);
    }

    .selector-list {
      display: grid;
      gap: 7px;
    }

    .selector-button {
      width: 100%;
      border: 1px solid rgba(23, 23, 23, 0.08);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 15px;
      padding: 10px 12px;
      text-align: left;
      font: inherit;
      font-size: 16px;
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, background-color 150ms ease;
    }

    .selector-button:hover {
      transform: translateY(-1px);
      border-color: rgba(213, 50, 50, 0.3);
    }

    .selector-button.is-active {
      background: #171717;
      color: #fffaf3;
      border-color: #171717;
    }

    .preview-wrap {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .preview-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .preview-top > div {
      padding-left: var(--label-inset);
    }

    .eyebrow {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      word-break: keep-all;
    }

    .desc {
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .preview-shell {
      position: relative;
      width: min(100%, 350px);
      margin: 0 auto;
      aspect-ratio: 3 / 4.55;
      background: #fff;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(42, 34, 23, 0.16);
    }

    .preview-shell > img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .preview-shell.is-saveable > img {
      pointer-events: auto;
      -webkit-touch-callout: default;
    }

    .stamp-hand {
      position: absolute;
      right: -42%;
      bottom: 2%;
      width: 122%;
      opacity: 0;
      transform: translate(38px, -42px) rotate(-8deg) scale(0.86);
      transform-origin: 34% 70%;
      pointer-events: none;
      z-index: 3;
    }

    .stamp-hand img {
      display: block;
      width: 100%;
      height: auto;
    }

    .stamp-hand.is-active {
      animation: hand-stamp 900ms cubic-bezier(.18,.82,.22,1) forwards;
    }

    .stamp-flash {
      animation: stamp-pop 520ms cubic-bezier(.18, .89, .32, 1.28);
    }

    .preview-shell.is-stamping {
      animation: paper-press 900ms cubic-bezier(.18,.82,.22,1);
    }

    .preview-shell.is-stamping::after {
      content: "";
      position: absolute;
      right: 16%;
      bottom: 25%;
      width: 18%;
      aspect-ratio: 1;
      border: 4px solid rgba(205, 0, 30, 0.72);
      border-radius: 50%;
      box-shadow: 0 0 0 8px rgba(205, 0, 30, 0.08);
      transform: rotate(-12deg) scale(0.2);
      animation: ink-hit 900ms ease-out forwards;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes stamp-pop {
      0% { transform: scale(1); }
      30% { transform: scale(0.97); }
      70% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    @keyframes paper-press {
      0%, 46%, 100% { transform: scale(1); }
      62% { transform: scale(0.992) rotate(-0.12deg); }
      78% { transform: scale(1.004) rotate(0.08deg); }
    }

    @keyframes ink-hit {
      0%, 48% {
        opacity: 0;
        transform: rotate(-12deg) scale(0.2);
      }
      58% {
        opacity: 0.88;
        transform: rotate(-12deg) scale(0.92);
      }
      76% {
        opacity: 0.28;
        transform: rotate(-12deg) scale(1.08);
      }
      100% {
        opacity: 0;
        transform: rotate(-12deg) scale(1.18);
      }
    }

    @keyframes hand-stamp {
      0% {
        opacity: 0;
        transform: translate(42px, -46px) rotate(-10deg) scale(0.86);
      }
      16% {
        opacity: 1;
      }
      50% {
        opacity: 1;
        transform: translate(0, 0) rotate(-4deg) scale(1);
      }
      62% {
        opacity: 1;
        transform: translate(-6px, 10px) rotate(0deg) scale(0.96);
      }
      80% {
        opacity: 1;
        transform: translate(2px, -4px) rotate(-5deg) scale(1.02);
      }
      90% {
        opacity: 1;
        transform: translate(4px, -8px) rotate(-7deg) scale(0.98);
      }
      100% {
        opacity: 0;
        transform: translate(16px, -18px) rotate(-8deg) scale(0.94);
      }
    }

    .status {
      min-height: 22px;
      color: var(--ink);
      font-size: 14px;
      text-align: center;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: -4px;
    }

    .actions.is-hidden {
      display: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--ink);
      color: #fffaf3;
    }

    .actions .primary {
      padding: 11px 16px;
      font-size: 15px;
    }

    .primary[disabled] {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }

    .ghost {
      background: rgba(23, 23, 23, 0.06);
      color: var(--ink);
    }

    .note {
      font-size: 13px;
      color: var(--muted);
    }

    .save-guide {
      display: none;
      margin: 2px auto 0;
      width: fit-content;
      max-width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(213, 50, 50, 0.16);
      border-radius: 999px;
      background: rgba(213, 50, 50, 0.08);
      font-size: 14px;
      line-height: 1.45;
      color: #9f1f1f;
      text-align: center;
    }

    .save-guide.is-visible {
      display: block;
    }

    .save-actions {
      display: none;
      justify-content: center;
      margin-top: 10px;
    }

    .save-actions.is-visible {
      display: flex;
    }

    .save-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 136px;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(23, 23, 23, 0.08);
      color: var(--ink);
      font-size: 14px;
      text-decoration: none;
      transition: transform 160ms ease, background 160ms ease;
    }

    .save-link:hover {
      transform: translateY(-1px);
      background: rgba(23, 23, 23, 0.12);
    }

    .site-footer {
      padding: 8px 0 18px;
      text-align: center;
    }

    .site-footer a {
      color: rgba(23, 23, 23, 0.56);
      font-size: 13px;
      text-decoration: none;
      transition: color 160ms ease;
    }

    .site-footer a:hover {
      color: rgba(23, 23, 23, 0.84);
    }

    .disclaimer {
      margin: 2px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(23, 23, 23, 0.42);
      letter-spacing: -0.01em;
    }

    @media (max-width: 820px) {
      :root {
        --label-inset: 6px;
      }

      .page {
        width: min(100%, calc(100% - 20px));
        padding-top: 10px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .selector {
        position: static;
      }

      .selector-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .selector-button {
        text-align: center;
        font-size: 15px;
        padding: 10px 9px;
      }

      .preview-wrap {
        padding: 13px;
      }

      .title-row {
        gap: 6px;
        max-width: 100%;
        padding: 2px 0 4px;
      }

      .title-figure {
        width: 54px;
      }

      .title-figure img {
        width: 100%;
        transform: none;
      }

      .title-stamp {
        width: 44px;
        height: 44px;
        margin-left: -4px;
        margin-top: -6px;
        transform: rotate(-11deg);
      }

      .hero-copy {
        margin: 2px 0 18px;
      }

      .stamp-hand {
        width: 122%;
        right: -42%;
        bottom: 2%;
      }

      .preview-top {
        flex-direction: column;
      }

      .preview-shell {
        width: min(100%, 315px);
      }

      .actions {
        display: flex;
        justify-content: center;
      }

      .actions button {
        width: auto;
        min-width: 138px;
      }

      .site-footer {
        padding: 4px 0 14px;
      }
    }

    @media (min-width: 560px) and (max-width: 820px) {
      :root {
        --label-inset: 7px;
      }

      .title-row {
        gap: 8px;
        max-width: 560px;
      }

      .title-figure {
        width: 72px;
      }

      .title-stamp {
        width: 54px;
        height: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="title-row">
        <div class="title-figure" aria-hidden="true">
          <img src="./assets/hero-jung-full-transparent.png" alt="" />
        </div>
        <div class="title-main">
          <h1>합격즁 발급소</h1>
        </div>
        <img class="title-stamp" src="./assets/title-stamp-trimmed.png" alt="" aria-hidden="true" />
      </div>
      <p class="hero-copy">입학하고 싶은 학교의 합격즁을 받아보세요!</p>
    </section>

    <section class="layout">
      <aside class="panel selector">
        <p class="selector-title">학교 선택</p>
        <div class="selector-list" id="selectorList"></div>
      </aside>

      <section class="panel preview-wrap">
        <div class="preview-top">
          <div>
            <div class="eyebrow">선택한 합격즁</div>
            <h2 id="previewTitle"></h2>
          </div>
        </div>

        <div class="preview-shell" id="previewShell">
          <img id="previewImage" alt="" />
          <div class="stamp-hand" id="stampHand" aria-hidden="true">
            <img src="./assets/stamp-hand-crop.png" alt="" />
          </div>
        </div>

        <div class="status" id="statusText"></div>

        <div class="actions">
          <button class="primary" id="downloadButton">다운로드</button>
        </div>

        <p class="save-guide" id="saveGuide">이미지를 꾹 눌러 저장해보세요!<br />안 되면 아래 이미지 열기를 눌러 저장하면 돼요!</p>
        <div class="save-actions" id="saveActions">
          <a class="save-link" id="saveLink" href="#" target="_blank" rel="noreferrer noopener">이미지 열기</a>
        </div>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <a href="https://www.instagram.com/ings_lab?igsh=YjAxNDNqbXFsa2Fk" target="_blank" rel="noreferrer noopener">@ings_lab</a>
  </footer>

  <script>
    const certificates = [
      { short: "의대", title: "의대 합격즁", file: "cert-1.jpg", stampedFile: "1-사진-1.jpg" },
      { short: "치대", title: "치대 합격즁", file: "cert-2.jpg", stampedFile: "2-사진-2.jpg" },
      { short: "한의대", title: "한의대 합격즁", file: "cert-3.jpg", stampedFile: "3-사진-3.jpg" },
      { short: "약대", title: "약대 합격즁", file: "cert-4.jpg", stampedFile: "4-사진-4.jpg" },
      { short: "수의대", title: "수의대 합격즁", file: "cert-5.jpg", stampedFile: "5-사진-5.jpg" },
      { short: "서울대", title: "서울대 합격즁", file: "cert-6.jpg", stampedFile: "6-사진-6.jpg" },
      { short: "고려대", title: "고려대 합격즁", file: "cert-7.jpg", stampedFile: "7-사진-7.jpg" },
      { short: "연세대", title: "연세대 합격즁", file: "cert-8.jpg", stampedFile: "8-사진-8.jpg" }
    ];

    const selectorList = document.getElementById("selectorList");
    const previewShell = document.getElementById("previewShell");
    const previewImage = document.getElementById("previewImage");
    const stampHand = document.getElementById("stampHand");
    const previewTitle = document.getElementById("previewTitle");
    const statusText = document.getElementById("statusText");
    const downloadButton = document.getElementById("downloadButton");
    const actions = document.querySelector(".actions");
    const saveGuide = document.getElementById("saveGuide");
    const saveActions = document.getElementById("saveActions");
    const saveLink = document.getElementById("saveLink");

    let currentCertificate = null;
    let selectorButtons = [];

    certificates.forEach((item) => {
      const button = document.createElement("button");
      button.className = "selector-button";
      button.type = "button";
      button.textContent = item.short;
      button.addEventListener("click", () => selectCertificate(item, button));
      selectorList.appendChild(button);
      selectorButtons.push(button);
    });

    function selectCertificate(item, activeButton) {
      currentCertificate = item;
      previewImage.src = `./assets/certs/${item.file}`;
      previewImage.alt = item.title;
      previewTitle.textContent = item.title;
      statusText.textContent = "";
      actions.classList.remove("is-hidden");
      downloadButton.disabled = false;
      saveGuide.classList.remove("is-visible");
      saveActions.classList.remove("is-visible");
      saveLink.removeAttribute("href");
      saveLink.removeAttribute("download");
      previewShell.classList.remove("is-stamping");
      previewShell.classList.remove("is-saveable");
      stampHand.classList.remove("is-active");

      selectorButtons.forEach((button) => button.classList.remove("is-active"));
      activeButton.classList.add("is-active");

      requestAnimationFrame(() => {
        previewShell.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
    }

    async function downloadCertificate() {
      if (!currentCertificate) return;

      statusText.textContent = "다운로드 준비 중...";
      downloadButton.disabled = true;

      stampHand.classList.remove("is-active");
      previewShell.classList.remove("is-stamping");
      void stampHand.offsetWidth;
      void previewShell.offsetWidth;
      previewShell.classList.add("is-stamping");
      stampHand.classList.add("is-active");
      await new Promise((resolve) => setTimeout(resolve, 900));

      previewShell.classList.remove("is-stamping");
      const stampedSource = `./assets/certs-stamped/${currentCertificate.stampedFile}`;
      previewImage.src = stampedSource;
      previewShell.classList.add("is-saveable");
      previewShell.classList.remove("stamp-flash");
      void previewShell.offsetWidth;
      previewShell.classList.add("stamp-flash");

      actions.classList.add("is-hidden");
      downloadButton.disabled = false;
      statusText.textContent = "짠, 발급 완료!";
      saveGuide.classList.add("is-visible");
      saveLink.href = stampedSource;
      saveLink.setAttribute("download", currentCertificate.stampedFile);
      saveActions.classList.add("is-visible");
      stampHand.classList.remove("is-active");
    }

    downloadButton.addEventListener("click", downloadCertificate);
    previewImage.addEventListener("contextmenu", (event) => {
      if (!previewShell.classList.contains("is-saveable")) {
        event.preventDefault();
      }
    });

    selectCertificate(certificates[0], selectorButtons[0]);
  </script>
</body>
</html>
